<html>
<head>
    <title>Form & Navigation</title>
    <style>
        body { 
            margin: 0; 
            scroll-behavior: smooth; 
            background-color:#000B1E; 
            font-family: sans-serif; 
            color: white; 
        } 
       .navbar {
        display: flex; 
        align-items: center;
        background-color: #333; 
        padding: 10px 20px; position: fixed; 
                    width: 100%;            
                    top: 0;            
                    z-index: 1000;        
                }
        .logo img {  
                      height: 50px;  
                      width: auto;   
                      border-radius: 50%; 
                      object-fit: cover;       
                       }
 .navbar ul {
    list-style: none; 
    display: flex; flex: 1; justify-content: center;  margin: 0;  padding: 0;   gap: 100px;}
 .navbar ul li a { color: white;          text-decoration: none; cursor: pointer;}
section { height: 100vh; padding: 100px 20px; display: flex; justify-content: center;   align-items: center; border-bottom: 1px solid #444; }
.modal {  display: none;   position: fixed;   z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }

        .modal-content {
            background-color: #1a1a1a;
            margin: 15% auto;
            padding: 30px;
            border: 1px solid #888;
            width: 300px;
            border-radius: 10px;
            text-align: center;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #fff;
        }

        input {
            display: block;
            width: 90%;
            margin: 10px auto;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        .chatbot-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #00bcd4;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    font-size: 24px;
    border: none;
    color: white;
    cursor: pointer;
}

/* CHATBOX */
.chatbox {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 300px;
    background: white;
    border-radius: 10px;
    display: none;
    flex-direction: column;
    overflow: hidden;
}

.chat-header {
    background: #00bcd4;
    padding: 10px;
    color: white;
    font-weight: bold;
}

.chat-body {
    height: 250px;
    overflow-y: auto;
    padding: 10px;
    color: black;
}

.chat-footer {
    display: flex;
}

.chat-footer input {
    flex: 1;
    padding: 10px;
    border: none;
    border-top: 1px solid #ccc;
}

.chat-footer button {
    background: #00bcd4;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}

.user {
    text-align: right;
    margin: 5px;
}

.bot {
    text-align: left;
    margin: 5px;
}
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">
            <img src="D:\GenAI\Screenshot 2026-04-09 105859.png" alt="Logo">
        </a>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#registration">Registration</a></li>
            <li><a href="#contact">Contact</a></li>
            <li><a onclick="openModal('loginModal')">Login</a></li>
            <li><a onclick="openModal('signinModal')">Sign In</a></li>
        </ul>
    </nav>

    <section id="home"><h1>Home </h1>
    </section>
    <section id="about"><h1>About Us Section</h1></section>
    <section id="registration"><h1>Registration Form Section</h1></section>
    <section id="contact"><h1>Contact Us Section</h1></section>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('loginModal')">&times;</span>
            <h2>Login</h2>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button>Login</button>
        </div>
    </div>

    <div id="signinModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('signinModal')">&times;</span>
            <h2>Sign In</h2>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Create Password">
            <button>Register</button>
        </div>
    </div>
    <button class="chatbot-button" onclick="toggleChat()">🤖</button>

<div class="chatbox" id="chatbox">
    <div class="chat-header">Chatbot</div>

    <div class="chat-body" id="chatBody">
        <p><b>Bot:</b> Hello! Type "help" to start</p>
    </div>

    <div class="chat-footer">
        <input type="text" id="userInput" placeholder="Type message..."
        onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function toggleChat() {
    let chatbox = document.getElementById("chatbox");
    chatbox.style.display = (chatbox.style.display === "flex") ? "none" : "flex";
}

function sendMessage() {
    const input = document.getElementById("userInput");
    const chatBody = document.getElementById("chatBody");
    const message = input.value.trim();

    if (!message) return;

    chatBody.innerHTML += "<div class='user'>You: " + message + "</div>";
    input.value = "";

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        chatBody.innerHTML += "<div class='bot'>Bot: " + data.response + "</div>";
        chatBody.scrollTop = chatBody.scrollHeight;
    });
}
</script>
</body>
</html>
